<aside class="side-nav" [class.collapsed]="collapsed()">
  <div class="nav-header">
    @if (!collapsed()) {
      <img src="images/angular-ai-course-logo.png" alt="Angular AI" class="logo" />
    }
    <button class="icon-btn toggle-btn" (click)="toggle.emit()" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <line x1="9" y1="3" x2="9" y2="21" />
      </svg>
    </button>
  </div>

  @if (collapsed()) {
    <div class="collapsed-icons">
      <img src="images/angular-ai-course-logo.png" alt="Angular AI" class="logo-small" />
      <button class="icon-btn" (click)="newChat.emit()" aria-label="New chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
      </button>
      <button class="icon-btn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
      </button>
    </div>
  } @else {
    <div class="nav-actions">
      <button class="nav-action-btn" (click)="newChat.emit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
        New Chat
      </button>
      <button class="nav-action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        Search in Chat
      </button>
    </div>

    <chat-history
      [conversations]="conversations()"
      [activeConversationId]="activeConversationId()"
      (conversationSelected)="conversationSelected.emit($event)"
    />
  }

  <div class="nav-footer">
    <button class="icon-btn logout-btn" (click)="logout.emit()" aria-label="Logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16,17 21,12 16,7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
    </button>
  </div>
</aside>
